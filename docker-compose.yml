services:
  postgres:
    image: postgres:16-alpine
    container_name: cantina_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cantina
      POSTGRES_PASSWORD: cantina
      POSTGRES_DB: cantina
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cantina -d cantina"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: cantina_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cantina:cantina@postgres:5432/cantina
      PORT: 3000
      NODE_ENV: development
      JWT_SECRET: dev_secret_change_in_prod
      JWT_EXPIRES_IN: 8h
      CORS_ORIGIN: http://localhost:5173
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: >
      sh -c "npx prisma migrate deploy && npx prisma db seed && npm run start:dev"

  adminer:
    image: adminer:latest
    container_name: cantina_adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
