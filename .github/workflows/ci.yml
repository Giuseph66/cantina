name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cantina
          POSTGRES_PASSWORD: cantina
          POSTGRES_DB: cantina
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Generate Prisma Client
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://cantina:cantina@localhost:5432/cantina
        run: npx prisma generate

      - name: Run migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://cantina:cantina@localhost:5432/cantina
        run: npx prisma migrate deploy

      - name: Run tests (api)
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://cantina:cantina@localhost:5432/cantina
          JWT_SECRET: test_secret
          JWT_EXPIRES_IN: 1h
          NODE_ENV: test
        run: npm run test

      - name: Build api
        working-directory: apps/api
        run: npm run build

      - name: Build web
        working-directory: apps/web
        run: npm run build
